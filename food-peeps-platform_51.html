    return d ? JSON.parse(d) : null;
  } catch (e) {
    return null;
  }
};

  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(d));
  } catch (e) {}
};

  try {
    const d = localStorage.getItem(MSG_KEY);
    return d ? JSON.parse(d) : [];
  } catch (e) {
    return [];
  }
};

  try {

    localStorage.setItem(MSG_KEY, JSON.stringify(ms.slice(0, 200)));
  } catch (e) {}
};

  try {
    localStorage.setItem(MSG_KEY, JSON.stringify(getMessages().map(m => m.id === id ? {
      ...m,

  } catch (e) {}
};
const deleteMsg = id => {
  try {
    localStorage.setItem(MSG_KEY, JSON.stringify(getMessages().filter(m => m.id !== id)));
  } catch (e) {}
};
const getPublished = () => {
  try {
    const d = localStorage.getItem(PUB_KEY);
    return d ? JSON.parse(d) : [];
  } catch (e) {
    return [];
  }
};

};

};

};

};

};

  try {
    const ts = getTxns();
    ts.unshift(t);
    localStorage.setItem(TXNS_KEY, JSON.stringify(ts.slice(0, 500)));

};
const updateTxn = (id, patch) => {
  try {
    localStorage.setItem(TXNS_KEY, JSON.stringify(getTxns().map(t => t.id === id ? {
      ...t,
